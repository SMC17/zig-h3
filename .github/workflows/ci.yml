name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig 0.16.0
        uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: zig fmt --check
        run: zig fmt --check src/ build.zig

      - name: zig build
        run: zig build

      - name: zig build test (libh3 wrapper + pure-Zig cross-validation)
        run: zig build test --summary all
